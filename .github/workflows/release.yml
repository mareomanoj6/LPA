name: Flatpak Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g. v1.0.0

permissions:
  contents: write

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils dbus-x11

      - name: Build Flatpak
        run: |
          # Use --user to avoid Polkit/system-helper permission errors on CI
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --install-deps-from=flathub --force-clean build-dir io.github.mareomanoj6.lpa.json
          flatpak build-export repo build-dir
          flatpak build-bundle repo lpa.flatpak io.github.mareomanoj6.lpa

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: lpa.flatpak
          generate_release_notes: true
          draft: false
          prerelease: false
